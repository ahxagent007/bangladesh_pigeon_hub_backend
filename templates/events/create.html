{% extends 'base.html' %}
{% block title %}Create Event — BPH{% endblock %}
{% block content %}
<div class="container" style="max-width:600px;padding:40px 16px 80px;">
  <h1 style="font-size:22px;font-weight:800;margin-bottom:24px;">📅 Create an Event</h1>
  <div class="card" style="padding:28px;">
    <form method="post" enctype="multipart/form-data">
      {% csrf_token %}
      <div class="form-group">
        <label>Event Title <span style="color:#ef4444;">*</span></label>
        <input type="text" name="title" placeholder="e.g. Dhaka Pigeon Racing Championship 2026" required>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;">
        <div class="form-group">
          <label>Event Type</label>
          <select name="event_type">
            {% for val,label in event_types %}<option value="{{ val }}">{{ label }}</option>{% endfor %}
          </select>
        </div>
        <div class="form-group">
          <label>District</label>
          <select name="district">
            {% for val,label in districts %}<option value="{{ val }}">{{ label }}</option>{% endfor %}
          </select>
        </div>
      </div>
      <div class="form-group">
        <label>Venue / Location <span style="color:#ef4444;">*</span></label>
        <input type="text" name="location" placeholder="e.g. Mirpur DOHS, Dhaka" required>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;">
        <div class="form-group">
          <label>Date <span style="color:#ef4444;">*</span></label>
          <input type="date" name="date" required>
        </div>
        <div class="form-group">
          <label>Time (optional)</label>
          <input type="time" name="time">
        </div>
      </div>
      <div class="form-group">
        <label>Description <span style="color:#ef4444;">*</span></label>
        <textarea name="description" rows="4" required placeholder="Details about the event, rules, prizes..."></textarea>
      </div>
      <div class="form-group">
        <label>Event Photo (optional)</label>
        <input type="file" name="image" accept="image/*">
      </div>
      <div style="display:flex;gap:10px;">
        <button type="submit" class="btn-primary" style="flex:1;padding:12px;">Create Event</button>
        <a href="/events/" class="btn-outline" style="padding:12px 18px;">Cancel</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
