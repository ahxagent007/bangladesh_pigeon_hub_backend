{% extends 'base.html' %}
{% block title %}Review {{ seller.username }} — BPH{% endblock %}
{% block content %}
<div class="container" style="max-width:520px;padding:40px 16px 80px;">
  <h1 style="font-size:22px;font-weight:800;margin-bottom:4px;">⭐ Leave a Review</h1>
  <p style="color:var(--text-muted);margin-bottom:28px;">for <strong>{{ seller.username }}</strong></p>
  <div class="card" style="padding:28px;">
    <form method="post">
      {% csrf_token %}
      <div class="form-group">
        <label style="font-weight:600;margin-bottom:10px;display:block;">Rating</label>
        <div class="star-picker" id="star-picker">
          {% for i in "12345" %}
          <label class="star-lbl">
            <input type="radio" name="rating" value="{{ forloop.counter }}"
                   {% if existing and existing.rating == forloop.counter %}checked{% endif %}>
            <span class="star">★</span>
          </label>
          {% endfor %}
        </div>
      </div>
      <div class="form-group">
        <label>Your Review <span style="color:#ef4444;">*</span></label>
        <textarea name="comment" rows="4" required placeholder="Share your experience with this seller...">{{ existing.comment|default:'' }}</textarea>
      </div>
      <div style="display:flex;gap:10px;">
        <button type="submit" class="btn-primary" style="flex:1;padding:12px;">Submit Review</button>
        <a href="/users/{{ seller.username }}/" class="btn-outline" style="padding:12px 18px;">Cancel</a>
      </div>
    </form>
  </div>
</div>
<style>
.star-picker { display:flex;gap:4px;font-size:32px;cursor:pointer;margin-bottom:8px; }
.star-lbl input { display:none; }
.star { color:#d1d5db;transition:color .1s; }
.star-lbl input:checked ~ .star,
.star-lbl:hover .star,
.star-lbl:hover ~ .star-lbl .star { color:#f59e0b; }
.star-picker:hover .star { color:#f59e0b; }
.star-picker .star-lbl:hover ~ .star-lbl .star { color:#d1d5db; }
</style>
{% endblock %}
