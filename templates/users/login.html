{% extends 'base.html' %}
{% block title %}Login — BPH{% endblock %}

{% block content %}
<div class="container">
  <div class="form-card card">
    <h2 style="margin-bottom:24px;font-size:22px;">Sign in</h2>
    <form method="post" novalidate id="login-form">
      {% csrf_token %}
      <input type="hidden" name="g-recaptcha-response" id="login-recaptcha-token">
      <div class="form-group">
        <label>Username or Phone Number</label>
        <input type="text" name="username" autofocus required>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" name="password" required>
      </div>
      <button type="submit" class="btn-primary" style="width:100%;padding:12px;">
        Sign In
      </button>
    </form>
    <div style="text-align:center;margin-top:14px;font-size:13px;">
      <a href="/auth/password-reset/" style="color:var(--text-muted);">Forgot password?</a>
    </div>
    <p style="text-align:center;margin-top:10px;font-size:14px;">
      No account? <a href="/auth/register/" style="color:var(--primary);">Join free</a>
    </p>
  </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
  document.getElementById('login-form').addEventListener('submit', function(e) {
    e.preventDefault();
    var form = this;
    grecaptcha.ready(function() {
      grecaptcha.execute(RECAPTCHA_SITE_KEY, {action: 'login'}).then(function(token) {
        document.getElementById('login-recaptcha-token').value = token;
        form.submit();
      });
    });
  });
</script>
{% endblock %}
