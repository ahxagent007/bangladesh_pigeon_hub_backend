{% extends 'base.html' %}
{% block title %}Reset Password — BPH{% endblock %}
{% block content %}
<div class="container" style="max-width:440px;padding:60px 16px 80px;">
  <div class="card" style="padding:36px;">
    <div style="text-align:center;margin-bottom:24px;">
      <div style="font-size:36px;margin-bottom:8px;">🔐</div>
      <h1 style="font-size:22px;font-weight:800;margin-bottom:6px;">Forgot your password?</h1>
      <p style="color:var(--text-muted);font-size:14px;margin:0;">
        Enter your email address and we'll send you a reset link.
      </p>
    </div>
    <form method="post">
      {% csrf_token %}
      <div class="form-group">
        <label style="font-size:14px;font-weight:600;">Email Address</label>
        <input type="email" name="email" required autofocus
               style="width:100%;padding:11px 13px;border:1px solid var(--border);border-radius:var(--radius);font-size:15px;outline:none;"
               placeholder="you@example.com">
      </div>
      <button type="submit" class="btn-primary"
              style="width:100%;padding:13px;font-size:15px;margin-top:4px;">
        Send Reset Link
      </button>
    </form>
    <div style="text-align:center;margin-top:20px;font-size:13px;color:var(--text-muted);">
      <a href="/auth/login/" style="color:var(--primary);">← Back to Login</a>
    </div>
  </div>
</div>
{% endblock %}
