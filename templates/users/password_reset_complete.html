{% extends 'base.html' %}
{% block title %}Password Reset Complete — BPH{% endblock %}
{% block content %}
<div class="container" style="max-width:440px;padding:60px 16px 80px;">
  <div class="card" style="padding:36px;text-align:center;">
    <div style="font-size:48px;margin-bottom:16px;">✅</div>
    <h1 style="font-size:22px;font-weight:800;margin-bottom:12px;">Password updated!</h1>
    <p style="color:var(--text-muted);font-size:14px;line-height:1.7;margin:0 0 28px;">
      Your password has been set successfully. You can now log in with your new password.
    </p>
    <a href="/auth/login/" class="btn-primary" style="display:inline-block;padding:13px 32px;font-size:15px;">
      Log In Now
    </a>
  </div>
</div>
{% endblock %}
