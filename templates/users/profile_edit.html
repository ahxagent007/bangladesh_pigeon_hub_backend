{% extends 'base.html' %}
{% block title %}Edit Profile — BPH{% endblock %}
{% block content %}
<div class="container" style="padding-top:40px;padding-bottom:60px;">
  <div style="max-width:520px;margin:0 auto;">
    <h1 style="font-size:22px;margin-bottom:24px;">Edit Profile</h1>

    <div class="card" style="padding:32px;">
      <form method="post" enctype="multipart/form-data" novalidate>
        {% csrf_token %}

        <!-- Avatar -->
        <div class="form-group" style="text-align:center;margin-bottom:28px;">
          <div style="position:relative;display:inline-block;">
            {% if user.avatar %}
              <img id="avatarPreview" src="{{ user.avatar.url }}"
                   style="width:90px;height:90px;border-radius:50%;
                          object-fit:cover;border:3px solid var(--primary);">
            {% else %}
              <div id="avatarPlaceholder"
                   style="width:90px;height:90px;border-radius:50%;
                          background:var(--primary);color:#fff;
                          display:flex;align-items:center;justify-content:center;
                          font-size:36px;font-weight:700;margin:0 auto;">
                {{ user.username|first|upper }}
              </div>
              <img id="avatarPreview"
                   style="width:90px;height:90px;border-radius:50%;
                          object-fit:cover;border:3px solid var(--primary);
                          display:none;">
            {% endif %}
            <label style="position:absolute;bottom:0;right:0;
                          background:var(--primary);color:#fff;
                          width:28px;height:28px;border-radius:50%;
                          display:flex;align-items:center;justify-content:center;
                          cursor:pointer;font-size:14px;">
              📷
              <input type="file" name="avatar" accept="image/*"
                     style="display:none;"
                     onchange="previewAvatar(this)">
            </label>
          </div>
        </div>

        <!-- Name row -->
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;">
          <div class="form-group">
            <label>First name</label>
            <input type="text" name="first_name"
                   value="{{ user.first_name }}">
          </div>
          <div class="form-group">
            <label>Last name</label>
            <input type="text" name="last_name"
                   value="{{ user.last_name }}">
          </div>
        </div>

        <div class="form-group">
          <label>Phone</label>
          <input type="text" name="phone"
                 value="{{ user.phone|default:'' }}"
                 placeholder="+1 555 000 0000">
        </div>

        <div class="form-group">
          <label>Location</label>
          <input type="text" name="location"
                 value="{{ user.location|default:'' }}"
                 placeholder="e.g. London, UK">
        </div>

        <div class="form-group">
          <label>Bio</label>
          <textarea name="bio" rows="3"
                    placeholder="Tell other users about yourself...">{{ user.bio|default:'' }}</textarea>
        </div>

        <div style="display:flex;gap:12px;">
          <button type="submit" class="btn-primary"
                  style="flex:1;padding:12px;">Save Changes</button>
          <a href="/dashboard/" class="btn-outline"
             style="padding:12px 20px;">Cancel</a>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
function previewAvatar(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    const preview = document.getElementById('avatarPreview');
    const placeholder = document.getElementById('avatarPlaceholder');
    preview.src = e.target.result;
    preview.style.display = 'block';
    if (placeholder) placeholder.style.display = 'none';
  };
  reader.readAsDataURL(file);
}
</script>
{% endblock %}
